name: Preview Pages

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  pull-requests: write
  contents: write

concurrency:
  group: preview-pages-${{ github.ref }}
  cancel-in-progress: true

jobs:
  preview:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Compute preview baseurl
        id: baseurl
        run: |
          TARGET_REPO="campflaw-previews"
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            echo "path=/${TARGET_REPO}/pr-${{ github.event.pull_request.number }}" >> "$GITHUB_OUTPUT"
          else
            BRANCH="${GITHUB_REF#refs/heads/}"
            echo "path=/${TARGET_REPO}/${BRANCH}" >> "$GITHUB_OUTPUT"
          fi

      - name: Override baseurl in config
        run: |
          echo "" >> _config.yml
          echo "baseurl: \"${{ steps.baseurl.outputs.path }}\"" >> _config.yml

      - name: Build with Jekyll
        uses: actions/jekyll-build-pages@v1
        with:
          source: ./
          destination: ./_site

      - name: Preview Pages
        uses: rajyan/preview-pages@v1
        with:
          source-dir: ./_site
          token: ${{ secrets.PREVIEW_PAGES_TOKEN2 }}
          target-repository: Finger-Lakes-Anthro-Weekend/campflaw-previews
          pr-per-commit: 'false'
          branch-per-commit: 'false'
