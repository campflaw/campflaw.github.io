name: Preview Pages

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  pull-requests: write
  contents: write

concurrency:
  group: preview-pages-${{ github.ref }}
  cancel-in-progress: true

jobs:
  preview:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Compute preview baseurl
        id: baseurl
        run: |
          REPO_NAME="${GITHUB_REPOSITORY#*/}"
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            echo "path=/${REPO_NAME}/pr-${{ github.event.pull_request.number }}" >> "$GITHUB_OUTPUT"
          else
            BRANCH="${GITHUB_REF#refs/heads/}"
            echo "path=/${REPO_NAME}/${BRANCH}" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'
          bundler-cache: true

      - name: Build with Jekyll
        run: bundle exec jekyll build --baseurl "${{ steps.baseurl.outputs.path }}"
        env:
          JEKYLL_ENV: production

      - name: Preview Pages
        uses: rajyan/preview-pages@v1
        with:
          source-dir: ./_site
          pr-per-commit: 'false'
          branch-per-commit: 'false'
